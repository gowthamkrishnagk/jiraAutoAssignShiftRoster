# ============================================================
#  PostgreSQL — production (Ubuntu server)
#  Setup: sudo -u postgres psql
#         CREATE DATABASE jiraassign;
#         CREATE USER jiraassign WITH PASSWORD 'changeme';
#         GRANT ALL PRIVILEGES ON DATABASE jiraassign TO jiraassign;
#
#  Run: java -jar app.jar --spring.profiles.active=postgres
#   Or: export DB_PROFILE=postgres && mvn spring-boot:run
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jiraassign}
spring.datasource.username=${DB_USER:jiraassign}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
