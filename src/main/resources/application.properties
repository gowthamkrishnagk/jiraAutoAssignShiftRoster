# ============================================================
#  Jira Shift Roster Auto-Assign
#  All sensitive values should be set as environment variables
# ============================================================

# --- Active DB profile: h2 (local) | postgres (server) ---
# Override on Ubuntu: java -jar app.jar --spring.profiles.active=postgres
spring.profiles.active=${DB_PROFILE:h2}

# --- JPA common ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Jira Connection ---
jira.url=${JIRA_URL:https://lla.atlassian.net}
jira.email=${JIRA_EMAIL:gowtham.krishna@libertypr.com}
jira.api-token=${JIRA_API_TOKEN:}
jira.project-key=${JIRA_PROJECT_KEY:SAC}

# --- Custom JQL (must include Assignee in (EMPTY) for unassigned ticket queries) ---
jira.custom-jql=${JIRA_CUSTOM_JQL:project = SAC AND status in ("In Progress","Waiting for support", "Escalated") and "Reporting Area[Dropdown]" = "Order Fallout" and Assignee in (EMPTY) and "Escalation Path[Dropdown]" is EMPTY ORDER BY created ASC}

# --- Individual Ticket Filters (used only if custom-jql is empty) ---
jira.target-statuses=Waiting for support
jira.target-issue-types=
jira.target-labels=
jira.only-unassigned=true

# --- Dry Run ---
jira.dry-run=${JIRA_DRY_RUN:false}

# --- Timezone (IST) ---
spring.jackson.time-zone=Asia/Kolkata

# --- Scheduler (every minute) ---
jira.schedule.cron=${JIRA_SCHEDULE_CRON:0 */1 * * * *}

# --- B2B monitor poll (faster, separate from auto-assign) — default every 30s ---
jira.b2b.schedule.cron=${JIRA_B2B_SCHEDULE_CRON:*/30 * * * * *}

# --- Scheduler thread pool ---
# Spring's default @Scheduled pool is a SINGLE thread shared by every scheduled job.
# The assign run blocks its thread for the whole run (up to the 10-min safety timeout,
# plus a 1s pause per ticket), so on one thread a slow/blocked run starves the B2B
# poll and the next assign tick — freezing all scheduling while the process stays up.
# Give each job room so they can't block each other.
spring.task.scheduling.pool.size=${SCHEDULER_POOL_SIZE:4}

# ============================================================
#  Server
# ============================================================
server.port=${PORT:8080}

# --- Static resource caching ---
# The UI is single-file HTML with inline CSS/JS. Serve it with no-cache so the
# browser (and the Salesforce app's embedded iframe) always revalidates and picks
# up a new build immediately after a deploy, instead of showing a stale cached
# page. Last-Modified is still sent, so unchanged files return a cheap 304.
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Reduce startup logging noise
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.com.jira=INFO

