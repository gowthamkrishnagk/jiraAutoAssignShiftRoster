# ============================================================
#  Jira Shift Roster Auto-Assign
#  All sensitive values should be set as environment variables
# ============================================================

# --- Jira Connection ---
jira.url=${JIRA_URL:https://lla.atlassian.net}
jira.email=${JIRA_EMAIL:gowtham.krishna@libertypr.com}
jira.api-token=${JIRA_API_TOKEN:}
jira.project-key=${JIRA_PROJECT_KEY:SAC}

# --- Custom JQL (must include Assignee in (EMPTY) for unassigned ticket queries) ---
jira.custom-jql=${JIRA_CUSTOM_JQL:project = SAC AND status in ("In Progress","Waiting for support", "Escalated") and "Reporting Area[Dropdown]" = "Order Fallout" and Assignee in (EMPTY) and "Escalation Path[Dropdown]" is EMPTY ORDER BY created ASC}

# --- Individual Ticket Filters (used only if custom-jql is empty) ---
jira.target-statuses=Waiting for support
jira.target-issue-types=
jira.target-labels=
jira.only-unassigned=true

# --- Dry Run ---
jira.dry-run=${JIRA_DRY_RUN:false}

# --- Timezone (IST) ---
spring.jackson.time-zone=Asia/Kolkata

# --- Scheduler (every minute) ---
jira.schedule.cron=${JIRA_SCHEDULE_CRON:0 */1 * * * *}

# ============================================================
#  PostgreSQL (Railway provides PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE)
# ============================================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:jira_roster}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ============================================================
#  Server
# ============================================================
server.port=${PORT:8080}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Reduce startup logging noise
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.com.jira=INFO
