# ============================================================
#  Jira Auto-Assign Configuration
#  Values are loaded from environment variables
# ============================================================

# --- Jira Connection ---
jira.url=${JIRA_URL}
jira.email=${JIRA_EMAIL}
jira.api-token=${JIRA_API_TOKEN}
jira.project-key=${JIRA_PROJECT_KEY}

# --- Round-Robin Assignees ---
jira.assignees=${JIRA_ASSIGNEES}

# --- Custom JQL ---
jira.custom-jql=${JIRA_CUSTOM_JQL}

# --- Individual Ticket Filters (used only if custom-jql is empty) ---
jira.target-statuses=${JIRA_TARGET_STATUSES:Waiting for support}
jira.target-issue-types=${JIRA_TARGET_ISSUE_TYPES:}
jira.target-labels=${JIRA_TARGET_LABELS:}

# Only assign tickets that currently have no assignee
jira.only-unassigned=${JIRA_ONLY_UNASSIGNED:true}

# --- Dry Run ---
jira.dry-run=${JIRA_DRY_RUN:false}

# --- Scheduler ---
jira.schedule.cron=${JIRA_SCHEDULE_CRON:0 */1 * * * *}
