# ============================================================
#  H2 — local development (file-mode, survives restarts)
#  DB file stored at ./data/jiraassign.mv.db
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/jiraassign;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 browser console — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
